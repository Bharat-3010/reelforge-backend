spring.application.name=backend

server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/zebvo_ai}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
